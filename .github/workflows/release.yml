name: Publish Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      META_FLOAT_KEYSTORE_BASE64: ${{ secrets.META_FLOAT_KEYSTORE_BASE64 }}
      META_FLOAT_STORE_PASSWORD: ${{ secrets.META_FLOAT_STORE_PASSWORD }}
      META_FLOAT_KEY_ALIAS: ${{ secrets.META_FLOAT_KEY_ALIAS }}
      META_FLOAT_KEY_PASSWORD: ${{ secrets.META_FLOAT_KEY_PASSWORD }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Set temporary keystore path
        shell: bash
        run: echo "META_FLOAT_KEYSTORE_FILE=$RUNNER_TEMP/metafloat-release.jks" >> "$GITHUB_ENV"

      - name: Validate release tag and signing secrets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle.kts)
          if [[ "$VERSION" != "$PROJECT_VERSION" ]]; then
            echo "Tag version $VERSION does not match project version $PROJECT_VERSION" >&2
            exit 1
          fi
          for NAME in \
            META_FLOAT_KEYSTORE_BASE64 \
            META_FLOAT_STORE_PASSWORD \
            META_FLOAT_KEY_ALIAS \
            META_FLOAT_KEY_PASSWORD; do
            if [[ -z "${!NAME:-}" ]]; then
              echo "Missing required GitHub Secret: $NAME" >&2
              exit 1
            fi
          done

      - name: Decode release keystore
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$META_FLOAT_KEYSTORE_BASE64" | base64 --decode > "$META_FLOAT_KEYSTORE_FILE"
          chmod 600 "$META_FLOAT_KEYSTORE_FILE"

      - name: Run checks and build signed release
        run: ./gradlew testDebugUnitTest lintDebug assembleRelease --stacktrace

      - name: Verify and prepare release files
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_APK="app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "$SOURCE_APK" ]]; then
            echo "Signed release APK was not generated" >&2
            exit 1
          fi

          BUILD_TOOLS=$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)
          "$BUILD_TOOLS/apksigner" verify --verbose "$SOURCE_APK"

          EXPECTED_VERSION_NAME=$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle.kts)
          EXPECTED_VERSION_CODE=$(sed -n 's/^[[:space:]]*versionCode = \([0-9]*\)/\1/p' app/build.gradle.kts)
          BADGING=$("$BUILD_TOOLS/aapt" dump badging "$SOURCE_APK" | head -n 1)
          echo "$BADGING" | grep -F "package: name='com.meta.float'"
          echo "$BADGING" | grep -F "versionCode='${EXPECTED_VERSION_CODE}'"
          echo "$BADGING" | grep -F "versionName='${EXPECTED_VERSION_NAME}'"

          mkdir -p release
          TARGET_APK="release/MetaFloat-v${VERSION}.apk"
          cp "$SOURCE_APK" "$TARGET_APK"
          (
            cd release
            sha256sum "MetaFloat-v${VERSION}.apk" > "MetaFloat-v${VERSION}.apk.sha256"
          )

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APK="release/MetaFloat-v${VERSION}.apk"
          CHECKSUM="${APK}.sha256"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$APK" "$CHECKSUM" --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --title "MetaFloat $GITHUB_REF_NAME"
          else
            gh release create "$GITHUB_REF_NAME" "$APK" "$CHECKSUM" \
              --verify-tag \
              --title "MetaFloat $GITHUB_REF_NAME" \
              --generate-notes
          fi

      - name: Remove temporary keystore
        if: always()
        shell: bash
        run: rm -f "$META_FLOAT_KEYSTORE_FILE"
